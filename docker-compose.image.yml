services:
  app:
    image: ${APP_IMAGE:-ghcr.io/kornjacaradee/epub-translate:latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-long-random-secret}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-this-password}
      ENABLE_LIBRETRANSLATE: ${ENABLE_LIBRETRANSLATE:-true}
      LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
      LIBRETRANSLATE_API_KEY: ${LIBRETRANSLATE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results

  worker:
    image: ${APP_IMAGE:-ghcr.io/kornjacaradee/epub-translate:latest}
    command: celery -A app.tasks.celery_worker worker --loglevel=INFO
    environment:
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-long-random-secret}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-this-password}
      ENABLE_LIBRETRANSLATE: ${ENABLE_LIBRETRANSLATE:-true}
      LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
      LIBRETRANSLATE_API_KEY: ${LIBRETRANSLATE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: epub_translate
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d epub_translate"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  libretranslate:
    image: ${LIBRETRANSLATE_IMAGE:-ghcr.io/kornjacaradee/epub-translate-libretranslate:latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      LT_THREADS: 4
    volumes:
      - ./models:/models:ro
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/languages', timeout=10).read()"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  libretranslate_data:
