services:
  app:
    image: ${APP_IMAGE}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      libretranslate:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results

  worker:
    image: ${APP_IMAGE}
    command: celery -A app.tasks.celery_worker worker --loglevel=INFO
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      libretranslate:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: epub_translate
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d epub_translate"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  libretranslate:
    image: ${LIBRETRANSLATE_IMAGE}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      LT_THREADS: 4
    volumes:
      - ./models:/models:ro
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/languages', timeout=10).read()"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  libretranslate_data:
