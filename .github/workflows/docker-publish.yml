name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          echo "app=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "libretranslate=ghcr.io/${GITHUB_REPOSITORY,,}-libretranslate" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app Docker metadata
        id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.app }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Extract LibreTranslate Docker metadata
        id: libretranslate-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.libretranslate }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}

      - name: Build and push LibreTranslate Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/libretranslate/Dockerfile
          push: true
          tags: ${{ steps.libretranslate-meta.outputs.tags }}
          labels: ${{ steps.libretranslate-meta.outputs.labels }}
